<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In and Sign up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="hb.png" class="logo">
            <p> Pay more and Never Pay Less !! </p>
        </div>
        <div class="login-container">
        <form action="" method="get">
            <div class="form-group"><input type="text" name="" id="" placeholder="Email or Phone" required></div>
            <div class="form-group"><input type="password" name="" id="" placeholder="Password" required></div>
            <div class="form-group"><button type="submit">Log In</button></div>
        </form>
        <a href="#"> Forgotten password? </a>
        <hr>
        <button class="create-account"> Create New Account</button>
        </div>
        <div class="footer"> 
            <p><a href="#">Privacy</a></p>
        </div>
    </div>

</body>
</html>
