<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Buttons Animation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="buttons-container">
      <button data-day="Monday" onclick="animateBoxes('Monday')">
        Monday </button>
      <button data-day="Tuesday" onclick="animateBoxes('Tuesday')">
        Tuesday </button>
      <button data-day="Wednesday" onclick="animateBoxes('Wednesday')">
        Wednesday </button>
      <button data-day="Thursday" onclick="animateBoxes('Thursday')">
        Thursday </button>
      <button data-day="Friday" onclick="animateBoxes('Friday')">
        Friday </button>
      <button data-day="Saturday" onclick="animateBoxes('Saturday')">
        Saturday </button>
      <button data-day="Sunday" onclick="animateBoxes('Sunday')">
        Sunday</button>
    </div>
    <div id="colorBox" class="box1">
        <img id="boxImage" src="monday.png" alt="Monday Image">
    </div>
    <div id="colorBox" class="box2">
        <img id="boxImage" src="tuesday.png" alt="Tuesday Image">
    </div>
    <div id="colorBox" class="box3">
        <img id="boxImage" src="wednesday.png" alt="Wednesday Image">
    </div>
    <div id="colorBox" class="box4">
        <img id="boxImage" src="thursday.png" alt="Thursday Image">
    </div>
    <div id="colorBox" class="box5">
        <img id="boxImage" src="friday.png" alt="Friday Image">
    </div>
    <div id="colorBox" class="box6">
        <img id="boxImage" src="saturday.png" alt="Saturday Image">
    </div>
    <div id="colorBox" class="box7">
        <img id="boxImage" src="sunday.png" alt="Sunday Image">
    </div>

    <script src="script.js"></script>
  </body>
</html>
